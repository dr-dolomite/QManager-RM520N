# =============================================================================
# QManager — lighttpd configuration for RM520N-GL
# =============================================================================
# QManager's own lighttpd config — independent of SimpleAdmin.
# No HTTP Basic Auth — QManager uses cookie-based session auth at the CGI level.
#
# Install location: /usrdata/qmanager/lighttpd.conf
# Service: systemctl restart lighttpd
# =============================================================================

server.modules = (
    "mod_redirect",
    "mod_cgi",
    "mod_proxy",
    "mod_openssl",
)

server.username  = "www-data"
server.groupname = "dialout"
server.port      = 80

# QManager owns its own web root
server.document-root = "/usrdata/qmanager/www"
index-file.names     = ( "index.html" )

# MIME types for Next.js static export
mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".svg"  => "image/svg+xml",
    ".ico"  => "image/x-icon",
    ".woff" => "font/woff",
    ".woff2" => "font/woff2",
    ".txt"  => "text/plain",
)

# --- HTTPS (port 443) -------------------------------------------------------
$SERVER["socket"] == "0.0.0.0:443" {
    ssl.engine    = "enable"
    ssl.privkey   = "/usrdata/qmanager/certs/server.key"
    ssl.pemfile   = "/usrdata/qmanager/certs/server.crt"
    ssl.openssl.ssl-conf-cmd = ("MinProtocol" => "TLSv1.2")
}

# --- HTTP -> HTTPS redirect --------------------------------------------------
$HTTP["scheme"] == "http" {
    url.redirect = ("" => "https://${url.authority}${url.path}${qsa}")
}

# --- CGI handler for all scripts in /cgi-bin/ --------------------------------
$HTTP["url"] =~ "/cgi-bin/" {
    cgi.assign = ( "" => "" )
}

# --- ttyd console proxy (/console -> localhost:8080) -------------------------
# Optional — only works if ttyd is installed and running
$HTTP["url"] =~ "(^/console)" {
    proxy.header = ("map-urlpath" => ( "/console" => "/" ), "upgrade" => "enable" )
    proxy.server = ( "" => ("" => ( "host" => "127.0.0.1", "port" => 8080 )))
}
